<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Dashboard Blue Edition</title>
    
    <style>
        :root {
            /* Đổi màu chủ đạo mặc định sang Xanh biển Neon */
            --theme-color: #00d2ff; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #080d1a;
        }

        /* Hình nền chính */
        .background-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://images.alphacoders.com/105/1053759.jpg'); 
            background-size: cover;
            background-position: center;
            transition: background 0.5s ease;
            z-index: 1;
        }

        /* Lớp phủ tối làm nổi bật chữ */
        .rain-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(10, 20, 40, 0.35);
            z-index: 2;
            pointer-events: none;
        }

        /* GIAO DIỆN DASHBOARD CHÍNH (Hiện ngay lập tức) */
        .dashboard {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
            padding-top: 10vh;
            color: var(--theme-color);
            text-shadow: 0px 0px 15px rgba(0, 210, 255, 0.6), 0px 4px 12px rgba(0, 0, 0, 0.9);
            transition: color 0.3s ease;
        }

        .time-widget h1 {
            font-size: 6.5rem;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-weight: 300;
            text-align: center;
        }

        .date-text {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-align: center;
            margin-top: 10px;
        }

        .clock-text {
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-align: center;
            margin-top: 8px;
            font-weight: 600;
        }

        /* Trình điều khiển & Sóng nhạc Visualizer */
        .player-container {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .music-controls {
            display: flex;
            gap: 30px;
            opacity: 0.5;
            transition: opacity 0.3s, transform 0.3s;
        }

        .music-controls:hover { 
            opacity: 1; 
            transform: scale(1.05);
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--theme-color);
            font-size: 1.6rem;
            cursor: pointer;
            filter: drop-shadow(0 0 8px var(--theme-color));
        }

        .visualizer {
            display: flex;
            align-items: center;
            gap: 5px;
            height: 50px;
        }

        .bar {
            width: 4px;
            height: 15px;
            background-color: var(--theme-color);
            box-shadow: 0 0 10px var(--theme-color);
            border-radius: 2px;
            animation: bounce 0.6s ease-in-out infinite alternate;
        }
        
        /* Nhịp sóng nhảy ngẫu nhiên */
        .bar:nth-child(2) { animation-delay: 0.1s; height: 30px; }
        .bar:nth-child(3) { animation-delay: 0.3s; height: 45px; }
        .bar:nth-child(4) { animation-delay: 0.2s; height: 25px; }
        .bar:nth-child(5) { animation-delay: 0.4s; height: 50px; }
        .bar:nth-child(6) { animation-delay: 0.1s; height: 35px; }
        .bar:nth-child(7) { animation-delay: 0.5s; height: 20px; }
        .bar:nth-child(8) { animation-delay: 0.2s; height: 38px; }

        @keyframes bounce { 
            0% { transform: scaleY(0.3); } 
            100% { transform: scaleY(1.1); } 
        }

        /* BẢNG TÙY BIẾN MOD GIAO DIỆN (ĐÃ LƯỢC BỎ PHẦN MẬT KHẨU) */
        .config-panel {
            position: fixed;
            bottom: 25px; right: 25px;
            background: rgba(10, 16, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            z-index: 50;
            color: #fff;
            border: 1px solid rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(12px);
            width: 280px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .panel-header h3 { 
            font-size: 0.85rem; 
            letter-spacing: 1px; 
            color: var(--theme-color);
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.4);
        }

        hr { border: 0; height: 1px; background: rgba(0, 210, 255, 0.2); margin: 12px 0; }

        .config-group { margin-bottom: 15px; }
        .config-group label {
            display: block; font-size: 0.75rem; opacity: 0.8; margin-bottom: 6px;
        }

        .config-panel input[type="text"] { 
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 0.8rem;
            outline: none;
            transition: border 0.3s;
        }
        
        .config-panel input[type="text"]:focus {
            border-color: var(--theme-color);
            background: rgba(255,255,255,0.08);
        }

        .upload-btn-wrapper { position: relative; overflow: hidden; margin-top: 6px; }

        .btn {
            border: 1px dashed rgba(0, 210, 255, 0.4);
            color: #00d2ff; background: transparent;
            padding: 8px; border-radius: 6px;
            font-size: 0.8rem; width: 100%; cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            background: rgba(0, 210, 255, 0.1);
        }

        .upload-btn-wrapper input[type=file] {
            position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
        }

        input[type="color"] { 
            padding: 0; height: 35px; width: 100%; cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background: transparent;
        }
    </style>
</head>
<body>

    <!-- KHU VỰC BACKGROUND -->
    <div class="background-container" id="bgContainer"></div>
    <div class="rain-overlay"></div>

    <!-- GIAO DIỆN DASHBOARD CHÍNH (VÀO THẲNG KHÔNG CẦN KHÓA) -->
    <div class="dashboard" id="mainDashboard">
        <div class="time-widget">
            <h1 id="dayName">Sunday</h1>
            <div id="fullDate" class="date-text">19, JULY, 2026</div>
            <div id="clockTime" class="clock-text">06 : 48 | AM</div>
        </div>

        <div class="player-container">
            <div class="music-controls">
                <button class="control-btn">⏮</button>
                <button class="control-btn">▶</button>
                <button class="control-btn">⏭</button>
            </div>
            <div class="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div>
            </div>
        </div>
    </div>

    <!-- BẢNG ĐIỀU KHỂN MOD GIAO DIỆN (ĐÃ LƯỢC BỎ BẢO MẬT) -->
    <div class="config-panel" id="configPanel">
        <div class="panel-header">
            <h3>⚙️ TÙY BIẾN GIAO DIỆN</h3>
        </div>
        <hr>
        <div class="config-group">
            <label>Thay đổi hình nền (Link):</label>
            <input type="text" id="bgLink" placeholder="Dán link ảnh vào đây...">
            <div class="upload-btn-wrapper">
                <button class="btn">Tải file ảnh từ máy</button>
                <input type="file" id="bgFile" accept="image/*">
            </div>
        </div>
        <div class="config-group">
            <label>Màu sắc chủ đạo:</label>
            <input type="color" id="themeColor" value="#00d2ff">
        </div>
    </div>

    <!-- XỬ LÝ LOGIC JAVASCRIPT -->
    <script>
        const mainDashboard = document.getElementById('mainDashboard');
        const configPanel = document.getElementById('configPanel');
        const bgContainer = document.getElementById('bgContainer');

        // ĐỒNG HỒ THỜI GIAN THỰC
        function updateClock() {
            const now = new Date();
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
            
            document.getElementById('dayName').innerText = days[now.getDay()];
            document.getElementById('fullDate').innerText = `${now.getDate()}, ${months[now.getMonth()]} ${now.getFullYear()}`;
            
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12 || 12;
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            
            document.getElementById('clockTime').innerText = `${hours} : ${minutes} | ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // TỰ ĐỘNG LOAD CONFIG CŨ TỪ LOCALSTORAGE (NẾU CÓ)
        const savedBg = localStorage.getItem('db_background');
        if (savedBg) bgContainer.style.backgroundImage = `url('${savedBg}')`;

        const savedColor = localStorage.getItem('db_theme_color');
        if (savedColor) {
            document.documentElement.style.setProperty('--theme-color', savedColor);
            document.getElementById('themeColor').value = savedColor;
        }

        // CHỨC NĂNG 1: Đổi nền bằng Link
        document.getElementById('bgLink').addEventListener('input', function() {
            if (this.value.trim()) {
                bgContainer.style.backgroundImage = `url('${this.value.trim()}')`;
                localStorage.setItem('db_background', this.value.trim());
            }
        });

        // CHỨC NĂNG 2: Đổi nền bằng File ảnh local
        document.getElementById('bgFile').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    bgContainer.style.backgroundImage = `url('${e.target.result}')`;
                    try { localStorage.setItem('db_background', e.target.result); } catch(e) {}
                };
                reader.readAsDataURL(file);
            }
        });

        // CHỨC NĂNG 3: Đổi màu chủ đạo hệ thống
        document.getElementById('themeColor').addEventListener('input', function() {
            document.documentElement.style.setProperty('--theme-color', this.value);
            localStorage.setItem('db_theme_color', this.value);
        });
    </script>
</body>
</html>
