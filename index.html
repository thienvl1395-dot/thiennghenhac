<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Anime Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HÌNH NỀN CHÍNH -->
    <div class="background-container" id="bgContainer"></div>
    <div class="rain-overlay"></div>

    <!-- MÀN HÌNH KHÓA TRUY CẬP (AUTH SCREEN) -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-box">
            <div class="lock-icon">🔒</div>
            <h2 id="authTitle">HỆ THỐNG ĐÃ KHÓA</h2>
            <p id="authSub">Vui lòng nhập khóa truy cập để mở giao diện</p>
            <input type="password" id="passwordInput" placeholder="Nhập mật khẩu (Mặc định: 1234)">
            <button id="unlockBtn">XÁC NHẬN</button>
            <p id="errorMsg" class="error-text"></p>
        </div>
    </div>

    <!-- GIAO DIỆN CHÍNH (DASHBOARD) -->
    <div class="dashboard hidden" id="mainDashboard">
        <!-- Widget thời gian -->
        <div class="time-widget">
            <h1 id="dayName">Sunday</h1>
            <div id="fullDate" class="date-text">19, JULY, 2026</div>
            <div id="clockTime" class="clock-text">06 : 48 | AM</div>
        </div>

        <!-- Trình điều khiển nhạc & Sóng nhạc -->
        <div class="player-container">
            <div class="music-controls">
                <button class="control-btn">⏮</button>
                <button class="control-btn" id="playBtn">▶</button>
                <button class="control-btn">⏭</button>
            </div>
            
            <div class="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>
    </div>

    <!-- BẢNG ĐIỀU KHIỂN & MOD GIAO DIỆN (GÓC MÀN HÌNH) -->
    <div class="config-panel hidden" id="configPanel">
        <div class="panel-header">
            <h3>⚙️ TÙY BIẾN GIAO DIỆN</h3>
            <button id="lockNowBtn" title="Khóa màn hình ngay">🔒</button>
        </div>
        
        <hr>

        <!-- Mod nền -->
        <div class="config-group">
            <label>Thay đổi hình nền:</label>
            <input type="text" id="bgLink" placeholder="Dán link ảnh vào đây...">
            <div class="upload-btn-wrapper">
                <button class="btn">Tải file ảnh từ máy</button>
                <input type="file" id="bgFile" accept="image/*">
            </div>
        </div>

        <!-- Mod màu giao diện -->
        <div class="config-group">
            <label>Màu sắc chủ đạo:</label>
            <input type="color" id="themeColor" value="#ffffff">
        </div>

        <!-- Đổi mật khẩu -->
        <div class="config-group">
            <label>Đổi khóa truy cập:</label>
            <input type="password" id="newPassInput" placeholder="Mật khẩu mới">
            <button id="changePassBtn" class="btn-primary">Cập nhật mật khẩu</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
