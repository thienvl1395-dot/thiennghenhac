<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Music Dashboard - Blue Real Audio</title>
    
    <style>
        :root {
            --theme-color: #00d2ff; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #080d1a;
        }

        /* Hình nền chính */
        .background-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://images.alphacoders.com/105/1053759.jpg'); 
            background-size: cover;
            background-position: center;
            transition: background 0.5s ease;
            z-index: 1;
        }

        .rain-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(10, 20, 40, 0.35);
            z-index: 2;
            pointer-events: none;
        }

        /* GIAO DIỆN CHÍNH */
        .dashboard {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
            padding-top: 10vh;
            color: var(--theme-color);
            text-shadow: 0px 0px 15px rgba(0, 210, 255, 0.5), 0px 4px 12px rgba(0, 0, 0, 0.9);
        }

        .time-widget h1 {
            font-size: 6.5rem;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-weight: 300;
            text-align: center;
        }

        .date-text {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-align: center;
            margin-top: 10px;
        }

        .clock-text {
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-align: center;
            margin-top: 8px;
            font-weight: 600;
        }

        /* TRÌNH PHÁT NHẠC THẬT */
        .player-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Tên bài hát đang phát */
        .track-title {
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.8;
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-controls {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--theme-color);
            font-size: 1.6rem;
            cursor: pointer;
            filter: drop-shadow(0 0 8px var(--theme-color));
            transition: transform 0.2s;
        }
        
        .control-btn:hover { transform: scale(1.15); }
        
        #playBtn {
            font-size: 2.2rem; /* Làm nổi bật nút Play */
        }

        /* SÓNG NHẠC ĐỒNG BỘ */
        .visualizer {
            display: flex;
            align-items: center;
            gap: 5px;
            height: 50px;
        }

        .bar {
            width: 4px;
            height: 15px;
            background-color: var(--theme-color);
            box-shadow: 0 0 10px var(--theme-color);
            border-radius: 2px;
            animation: bounce 0.6s ease-in-out infinite alternate;
            animation-play-state: paused; /* Mặc định đứng im khi chưa bật nhạc */
        }
        
        /* Chạy sóng khi trình phát có class .playing */
        .visualizer.playing .bar {
            animation-play-state: running;
        }
        
        .bar:nth-child(2) { animation-delay: 0.1s; height: 30px; }
        .bar:nth-child(3) { animation-delay: 0.3s; height: 45px; }
        .bar:nth-child(4) { animation-delay: 0.2s; height: 25px; }
        .bar:nth-child(5) { animation-delay: 0.4s; height: 50px; }
        .bar:nth-child(6) { animation-delay: 0.1s; height: 35px; }
        .bar:nth-child(7) { animation-delay: 0.5s; height: 20px; }
        .bar:nth-child(8) { animation-delay: 0.2s; height: 38px; }

        @keyframes bounce { 
            0% { transform: scaleY(0.3); } 
            100% { transform: scaleY(1.1); } 
        }

        /* BẢNG ĐIỀU KHIỂN / MOD HỆ THỐNG */
        .config-panel {
            position: fixed;
            bottom: 25px; right: 25px;
            background: rgba(10, 16, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            z-index: 50;
            color: #fff;
            border: 1px solid rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(12px);
            width: 290px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .panel-header h3 { 
            font-size: 0.85rem; 
            letter-spacing: 1px; 
            color: var(--theme-color);
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.4);
        }

        hr { border: 0; height: 1px; background: rgba(0, 210, 255, 0.2); margin: 12px 0; }

        .config-group { margin-bottom: 12px; }
        .config-group label {
            display: block; font-size: 0.75rem; opacity: 0.8; margin-bottom: 5px;
        }

        .config-panel input[type="text"] { 
            width: 100%;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 0.75rem;
            outline: none;
        }
        
        .config-panel input[type="text"]:focus { border-color: var(--theme-color); }

        .upload-btn-wrapper { position: relative; overflow: hidden; margin-top: 4px; }

        .btn {
            border: 1px dashed rgba(0, 210, 255, 0.4);
            color: #00d2ff; background: transparent;
            padding: 6px; border-radius: 6px;
            font-size: 0.75rem; width: 100%; cursor: pointer;
            text-align: center;
        }
        .btn:hover { background: rgba(0, 210, 255, 0.1); }

        .upload-btn-wrapper input[type=file] {
            position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
        }

        input[type="color"] { 
            padding: 0; height: 30px; width: 100%; cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background: transparent;
        }
    </style>
</head>
<body>

    <!-- THÀNH PHẦN ẨN: AUDIO HTML5 ĐỂ CHẠY NHẠC -->
    <audio id="realAudio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <!-- BACKGROUND -->
    <div class="background-container" id="bgContainer"></div>
    <div class="rain-overlay"></div>

    <!-- GIAO DIỆN CHÍNH -->
    <div class="dashboard" id="mainDashboard">
        <div class="time-widget">
            <h1 id="dayName">Sunday</h1>
            <div id="fullDate" class="date-text">19, JULY, 2026</div>
            <div id="clockTime" class="clock-text">06 : 48 | AM</div>
        </div>

        <div class="player-container">
            <!-- Tên bài nhạc hiển thị -->
            <div class="track-title" id="trackTitle">🎵 Default SoundHelix Track</div>
            
            <div class="music-controls">
                <button class="control-btn" id="prevBtn">⏮</button>
                <button class="control-btn" id="playBtn">▶</button>
                <button class="control-btn" id="nextBtn">⏭</button>
            </div>
            
            <!-- Khu vực sóng nhạc -->
            <div class="visualizer" id="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div>
            </div>
        </div>
    </div>

    <!-- BẢNG TÙY BIẾN MOD GIAO DIỆN & NHẠC -->
    <div class="config-panel" id="configPanel">
        <div class="panel-header">
            <h3>⚙️ PHÁT NHẠC & TÙY BIẾN</h3>
        </div>
        <hr>
        
        <!-- MOD FILE NHẠC -->
        <div class="config-group">
            <label>Thay bài nhạc (Link MP3):</label>
            <input type="text" id="musicLink" placeholder="Dán link audio/mp3 vào đây...">
            <div class="upload-btn-wrapper">
                <button class="btn">Tải file nhạc từ thiết bị</button>
                <input type="file" id="musicFile" accept="audio/*">
            </div>
        </div>

        <hr>
        <!-- MOD HÌNH NỀN -->
        <div class="config-group">
            <label>Thay đổi hình nền (Link):</label>
            <input type="text" id="bgLink" placeholder="Dán link ảnh vào đây...">
            <div class="upload-btn-wrapper">
                <button class="btn">Tải file ảnh từ thiết bị</button>
                <input type="file" id="bgFile" accept="image/*">
            </div>
        </div>
        
        <!-- MOD MÀU SẮC -->
        <div class="config-group">
            <label>Màu sắc chủ đạo:</label>
            <input type="color" id="themeColor" value="#00d2ff">
        </div>
    </div>

    <script>
        const bgContainer = document.getElementById('bgContainer');
        const realAudio = document.getElementById('realAudio');
        const playBtn = document.getElementById('playBtn');
        const visualizer = document.getElementById('visualizer');
        const trackTitle = document.getElementById('trackTitle');

        // --- XỬ LÝ TRÌNH PHÁT NHẠC THẬT ---
        playBtn.addEventListener('click', function() {
            if (realAudio.paused) {
                realAudio.play();
                playBtn.innerText = "⏸"; // Đổi icon thành Pause
                visualizer.classList.add('playing'); // Kích hoạt sóng nhảy
            } else {
                realAudio.pause();
                playBtn.innerText = "▶"; // Đổi icon thành Play
                visualizer.classList.remove('playing'); // Cho sóng dừng
            }
        });

        // Thay nhạc bằng Link MP3 ngoài
        document.getElementById('musicLink').addEventListener('input', function() {
            const link = this.value.trim();
            if (link) {
                realAudio.src = link;
                trackTitle.innerText = "🎵 Custom URL Audio Track";
                if (!realAudio.paused) realAudio.play();
            }
        });

        // Thay nhạc bằng cách upload file .mp3 từ máy
        document.getElementById('musicFile').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                realAudio.src = fileURL;
                trackTitle.innerText = `🎵 ${file.name}`;
                // Tự động phát sau khi nhận file mới
                realAudio.play();
                playBtn.innerText = "⏸";
                visualizer.classList.add('playing');
            }
        });


        // --- ĐỒNG HỒ THỜI GIAN THỰC ---
        function updateClock() {
            const now = new Date();
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
            
            document.getElementById('dayName').innerText = days[now.getDay()];
            document.getElementById('fullDate').innerText = `${now.getDate()}, ${months[now.getMonth()]} ${now.getFullYear()}`;
            
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12 || 12;
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            
            document.getElementById('clockTime').innerText = `${hours} : ${minutes} | ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();


        // --- QUẢN LÝ MOD CẤU HÌNH (LOCALSTORAGE) ---
        const savedBg = localStorage.getItem('db_background');
        if (savedBg) bgContainer.style.backgroundImage = `url('${savedBg}')`;

        const savedColor = localStorage.getItem('db_theme_color');
        if (savedColor) {
            document.documentElement.style.setProperty('--theme-color', savedColor);
            document.getElementById('themeColor').value = savedColor;
        }

        // Mod hình nền bằng Link
        document.getElementById('bgLink').addEventListener('input', function() {
            if (this.value.trim()) {
                bgContainer.style.backgroundImage = `url('${this.value.trim()}')`;
                localStorage.setItem('db_background', this.value.trim());
            }
        });

        // Mod hình nền bằng File ảnh
        document.getElementById('bgFile').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    bgContainer.style.backgroundImage = `url('${e.target.result}')`;
                    try { localStorage.setItem('db_background', e.target.result); } catch(err) {}
                };
                reader.readAsDataURL(file);
            }
        });

        // Đổi màu chủ đạo hệ thống
        document.getElementById('themeColor').addEventListener('input', function() {
            document.documentElement.style.setProperty('--theme-color', this.value);
            localStorage.setItem('db_theme_color', this.value);
        });
    </script>
</body>
</html>
